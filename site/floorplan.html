    .device-marker { cursor:pointer; transition:opacity .15s,filter .15s; filter:drop-shadow(0 1px 2px rgba(0,0,0,.15)); }

    .device-marker .hit-area { fill:transparent; stroke:none; pointer-events:all; }
    .device-marker .marker-shape { transition:stroke .15s,stroke-width .15s,stroke-opacity .15s; stroke:transparent; stroke-width:0; }
    .device-marker:hover .marker-shape { stroke:#1E293B; stroke-width:1; stroke-opacity:.4; }
    .legend-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:8px; margin-top:16px; }
    .legend-item { display:flex; align-items:center; gap:8px; font-size:.8rem; color:var(--text-secondary); padding:4px 8px; border-radius:6px; background:#F1F5F9; cursor:pointer; transition:background .2s; user-select:none; }
    .legend-item:hover { background:var(--bg-card-hover); }
    .legend-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
    .filter-bar { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
    .filter-btn { padding:6px 14px; border-radius:20px; font-size:.8rem; border:1px solid var(--border); background:var(--bg-card); color:var(--text-secondary); cursor:pointer; transition:all .2s; user-select:none; }
    .filter-btn:hover { border-color:var(--accent); color:var(--accent); }
    .filter-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:600; }
    .device-panel { position:fixed; top:0; right:-420px; width:400px; height:100vh; background:var(--bg-secondary); border-left:1px solid var(--border); z-index:200; transition:right .3s ease; overflow-y:auto; padding:24px; box-shadow:-4px 0 20px rgba(0,0,0,.08); }
    .device-panel.open { right:0; }
    .device-panel-close { position:absolute; top:16px; right:16px; width:32px; height:32px; border-radius:50%; border:1px solid var(--border); background:var(--bg-card); color:var(--text-primary); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

    .panel-model { font-size:.85rem; color:var(--accent); margin-bottom:12px; }
    .panel-room { font-size:.85rem; color:var(--text-muted); margin-bottom:16px; }

    .panel-section p,.panel-section li { font-size:.85rem; color:var(--text-primary); line-height:1.6; }
    .panel-section ul { padding-left:16px; }
    .panel-link { display:inline-block; margin-top:12px; padding:8px 20px; background:var(--accent); color:#fff; border-radius:8px; font-weight:600; font-size:.85rem; transition:background .2s; }

    .device-panel-overlay { position:fixed; inset:0; background:rgba(0,0,0,.3); z-index:199; display:none; }

    // === 休闲阳台 Leisure Balcony  x[183,241] y[371,493] ===

    { id:'a-c3',    type:'curtain',  room:'休闲阳台', name:'C3 窗帘(南窗)', model:'C3',          x:188,y:435, pos:'阳台南窗',          productId:'curtain-c3' },
  ];

  const svgNS = 'http://www.w3.org/2000/svg';
  const layer = document.getElementById('deviceLayer');
  const boundaryLayer = document.getElementById('roomBoundaryLayer');
  const filterBar = document.getElementById('filterBar');
  const legendGrid = document.getElementById('legendGrid');
  const panel = document.getElementById('devicePanel');
  const panelOverlay = document.getElementById('panelOverlay');
  const panelContent = document.getElementById('panelContent');
  const panelClose = document.getElementById('panelClose');
  let activeFilter = 'all', activeDevice = null;
  let showBoundaries = true;

  function renderBoundaries() {
    boundaryLayer.innerHTML = '';
    if (!showBoundaries) return;
    Object.entries(ROOM_POLYGONS).forEach(([name, room]) => {
      const pts = room.points.map(p => p.join(',')).join(' ');
      const poly = document.createElementNS(svgNS, 'polygon');
      poly.setAttribute('points', pts);
      poly.setAttribute('fill', room.color);
      poly.setAttribute('fill-opacity', '0.08');
      poly.setAttribute('stroke', room.color);
      poly.setAttribute('stroke-width', '2');
      poly.setAttribute('stroke-opacity', '0.7');
      poly.setAttribute('stroke-dasharray', '6,3');
      boundaryLayer.appendChild(poly);
      const cx = room.points.reduce((s, p) => s + p[0], 0) / room.points.length;
      const cy = room.points.reduce((s, p) => s + p[1], 0) / room.points.length;
      const label = document.createElementNS(svgNS, 'text');
      label.setAttribute('x', cx);
      label.setAttribute('y', cy);
      label.setAttribute('text-anchor', 'middle');
      label.setAttribute('dominant-baseline', 'central');
      label.setAttribute('fill', room.color);
      label.setAttribute('font-size', '9');
      label.setAttribute('font-weight', '700');
      label.setAttribute('opacity', '0.65');
      label.textContent = name;
      boundaryLayer.appendChild(label);
    });
  }

  document.getElementById('toggleBoundaries').addEventListener('click', function() {
    showBoundaries = !showBoundaries;
    this.textContent = '房间边界: ' + (showBoundaries ? 'ON' : 'OFF');
    this.style.background = showBoundaries ? 'var(--accent)' : 'var(--bg-card)';
    this.style.color = showBoundaries ? '#fff' : 'var(--text-secondary)';
    renderBoundaries();
  });

  function createShape(type, x, y) {
    const cfg = DEVICE_TYPES[type];
    if (!cfg) return null;
    const s = cfg.size;
    let el;
    switch (cfg.shape) {
      case 'circle':
        el = document.createElementNS(svgNS, 'circle');
        el.setAttribute('cx', x); el.setAttribute('cy', y); el.setAttribute('r', s);
        break;
      case 'square':
        el = document.createElementNS(svgNS, 'rect');
        el.setAttribute('x', x - s); el.setAttribute('y', y - s);
        el.setAttribute('width', s * 2); el.setAttribute('height', s * 2); el.setAttribute('rx', 1.5);
        break;
      case 'diamond':
        el = document.createElementNS(svgNS, 'polygon');
        el.setAttribute('points', `${x},${y-s} ${x+s},${y} ${x},${y+s} ${x-s},${y}`);
        break;
      case 'triangle':
        el = document.createElementNS(svgNS, 'polygon');
        el.setAttribute('points', `${x},${y-s} ${x+s},${y+s*.7} ${x-s},${y+s*.7}`);
        break;
      case 'octagon': {
        const r = s, a = r * .414;
        el = document.createElementNS(svgNS, 'polygon');
        el.setAttribute('points', [
          `${x-a},${y-r}`, `${x+a},${y-r}`, `${x+r},${y-a}`, `${x+r},${y+a}`,
          `${x+a},${y+r}`, `${x-a},${y+r}`, `${x-r},${y+a}`, `${x-r},${y-a}`
        ].join(' '));
        break;
      }
      case 'rect':
        el = document.createElementNS(svgNS, 'rect');
        el.setAttribute('x', x - s * 1.5); el.setAttribute('y', y - s * .5);
        el.setAttribute('width', s * 3); el.setAttribute('height', s); el.setAttribute('rx', 1.5);
        break;
    }
    el.setAttribute('fill', cfg.color);
    return el;
  }

  function renderDevices() {
    layer.innerHTML = '';
    DEVICES.forEach(d => {
      const cfg = DEVICE_TYPES[d.type];
      if (!cfg) return;
      const pos = { x: d.x, y: d.y };
      const g = document.createElementNS(svgNS, 'g');
      g.classList.add('device-marker');
      g.dataset.id = d.id;
      g.dataset.type = d.type;
      if (activeFilter !== 'all' && d.type !== activeFilter) {
        g.style.opacity = '0.12';
        g.style.pointerEvents = 'none';
      }
      const hit = document.createElementNS(svgNS, 'circle');
      hit.setAttribute('cx', pos.x); hit.setAttribute('cy', pos.y);
      hit.setAttribute('r', 10);
      hit.classList.add('hit-area');
      g.appendChild(hit);
      const shape = createShape(d.type, pos.x, pos.y);
      if (shape) { shape.classList.add('marker-shape'); g.appendChild(shape); }
      if (d.count && d.count > 1) {
        const t = document.createElementNS(svgNS, 'text');
        t.setAttribute('x', pos.x + cfg.size + 2); t.setAttribute('y', pos.y + 2.5);
        t.setAttribute('fill', cfg.color); t.setAttribute('font-size', '6'); t.setAttribute('font-weight', '700');
        t.textContent = '\u00d7' + d.count;
        g.appendChild(t);
      }
      const title = document.createElementNS(svgNS, 'title');
      title.textContent = `${d.name}\n${d.room} \u00b7 ${d.pos}`;
      g.appendChild(title);
      g.addEventListener('click', () => openPanel(d));
      layer.appendChild(g);
    });
    document.getElementById('total-count').textContent = DEVICES.reduce((s, d) => s + (d.count || 1), 0);
  }

  function openPanel(d) {
    const cfg = DEVICE_TYPES[d.type];
    const prod = d.productId && typeof PRODUCTS !== 'undefined' ? PRODUCTS[d.productId] : null;
    let html = '';
    if (prod && prod.image) {
      html += `<div style="text-align:center;margin-bottom:16px;background:#F8FAFC;border-radius:10px;padding:12px;border:1px solid var(--border);">
        <img src="${prod.image}" alt="${d.name}" style="max-width:100%;max-height:180px;object-fit:contain;border-radius:6px;"
             onerror="this.parentElement.style.display='none'" />
      </div>`;
    }
    html += `<div class="panel-title">${d.name}</div>
      <div class="panel-model">${d.model}</div>`;
    if (prod && prod.price) {
      html += `<div style="font-size:1.3rem;font-weight:700;color:#E74C3C;margin:6px 0 10px;">\u00a5${prod.price}${d.count > 1 ? `<span style="font-size:.8rem;font-weight:400;color:var(--text-muted);margin-left:8px;">\u00d7${d.count} = \u00a5${prod.price * d.count}</span>` : ''}</div>`;
    }
    html += `<div class="panel-room">\ud83d\udccd ${d.room} \u00b7 ${d.pos}</div>
      <div style="display:inline-block;padding:3px 10px;border-radius:12px;font-size:.75rem;background:${cfg.color}18;color:${cfg.color};border:1px solid ${cfg.color}44;margin-bottom:16px;">${cfg.label}</div>`;
    if (prod) {
      html += `<div class="panel-section"><h4>产品功能</h4><ul>`;
      (prod.features || []).forEach(f => html += `<li>${f}</li>`);
      html += `</ul></div>`;
      if (prod.specs) {
        html += `<div class="panel-section"><h4>规格参数</h4><table style="width:100%;font-size:.8rem;">`;
        Object.entries(prod.specs).forEach(([k, v]) => {
          html += `<tr><td style="color:var(--text-muted);padding:3px 8px 3px 0;white-space:nowrap;">${k}</td><td style="color:var(--text-primary);padding:3px 0;">${v}</td></tr>`;
        });
        html += `</table></div>`;
      }
      if (prod.install) html += `<div class="panel-section"><h4>安装说明</h4><p>${prod.install}</p></div>`;
      if (prod.buyUrl) html += `<a class="panel-link" href="${prod.buyUrl}" target="_blank">${prod.buyLabel || '查看购买链接'} \u2192</a>`;
      html += `<a class="panel-link" href="products.html#${d.productId}" style="margin-left:8px;background:var(--bg-card);color:var(--accent);border:1px solid var(--accent);">产品目录 \u2192</a>`;
    } else {
      html += `<div class="panel-section"><h4>安装位置</h4><p>${d.pos}</p></div>`;
    }
    panelContent.innerHTML = html;
    panel.classList.add('open');
    panelOverlay.classList.add('open');
    if (activeDevice) {
      const prev = layer.querySelector(`[data-id="${activeDevice}"]`);
      if (prev) prev.classList.remove('active');
    }
    activeDevice = d.id;
    const mk = layer.querySelector(`[data-id="${d.id}"]`);
    if (mk) mk.classList.add('active');
  }

  function closePanel() {
    panel.classList.remove('open');
    panelOverlay.classList.remove('open');
    if (activeDevice) {
      const prev = layer.querySelector(`[data-id="${activeDevice}"]`);
      if (prev) prev.classList.remove('active');
      activeDevice = null;
    }
  }
  panelClose.addEventListener('click', closePanel);
  panelOverlay.addEventListener('click', closePanel);

  const usedTypes = [...new Set(DEVICES.map(d => d.type))];
  let fhtml = `<button class="filter-btn active" data-type="all">全部</button>`;
  usedTypes.forEach(t => {
    const c = DEVICE_TYPES[t];
    if (c) fhtml += `<button class="filter-btn" data-type="${t}"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${c.color};margin-right:4px;vertical-align:middle;"></span>${c.label}</button>`;
  });
  filterBar.innerHTML = fhtml;
  filterBar.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.type;
    renderDevices();
  });

  let lhtml = '';
  usedTypes.forEach(t => {
    const c = DEVICE_TYPES[t];
    if (c) {
      const cnt = DEVICES.filter(d => d.type === t).reduce((s, d) => s + (d.count || 1), 0);
      lhtml += `<div class="legend-item" data-type="${t}"><span class="legend-dot" style="background:${c.color}"></span>${c.label} (${cnt})</div>`;
    }
  });
  legendGrid.innerHTML = lhtml;
  legendGrid.addEventListener('click', e => {
    const item = e.target.closest('.legend-item');
    if (!item) return;
    const btn = filterBar.querySelector(`[data-type="${item.dataset.type}"]`);
    if (btn) btn.click();
  });

  renderBoundaries();
  renderDevices();

  const hamburger = document.querySelector('.hamburger');
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.querySelector('.overlay');
  if (hamburger) {
    hamburger.addEventListener('click', () => { sidebar.classList.toggle('open'); overlay.classList.toggle('active'); });
    overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('active'); });
  }
  </script>
